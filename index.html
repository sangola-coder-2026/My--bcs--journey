
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>पुरुषोत्तम मास 2026</title>
    <style>
        body {
            background:linear-gradient(135deg,#1a1a2e 0%,#e94560 100%);
            color: #fff;
            font-family: Arial;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        .box {
            background: #16213e;
            padding: 25px;
            border-radius: 15px;
            max-width: 400px;
            margin: 40px auto;
            border: 2px solid #e94560;
        }
        h1 { color: #f9ed69; margin: 0 0 15px 0; }
        #tithi { color: #f9ed69; font-size: 18px; margin-bottom: 20px; }
        #timer { font-size: 32px; font-weight: bold; line-height: 1.5; }
        .unit { font-size: 14px; color: #ccc; }
        button {
            background: #e94560;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 25px;
            margin-top: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>पुरुषोत्तम मास 2026 🙏</h1>
        <div id="tithi"></div>
        <div id="timer">लोड होत आहे...</div>
        <button onclick="const m=new SpeechSynthesisUtterance('ओम नमो भगवते वासुदेवाय');m.lang='hi-IN';m.rate=0.8;speechSynthesis.speak(m)">🔊 मंत्र ऐका</button>
    </div>

    <script>
        // Timer
        var targetDate = new Date("2027-06-15T00:00:00+05:30").getTime();
        setInterval(function() {
            var now = new Date().getTime();
            var diff = targetDate - now;
            
            var days = Math.floor(diff / (1000 * 60 * 60 * 24));
            var hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            var minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            var seconds = Math.floor((diff % (1000 * 60)) / 1000);
            
            document.getElementById("timer").innerHTML = 
                days + " <span class='unit'>दिवस</span><br>" +
                hours + " <span class='unit'>तास</span> " +
                minutes + " <span class='unit'>मिनिटे</span> " +
                seconds + " <span class='unit'>सेकंद</span>";
        }, 1000);
